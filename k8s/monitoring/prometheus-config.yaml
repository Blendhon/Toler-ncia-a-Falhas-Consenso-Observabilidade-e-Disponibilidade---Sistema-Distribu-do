apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: trabalho-sis-dis
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s

    scrape_configs:
      - job_name: "gateway"
        static_configs:
          - targets: ["gateway.trabalho-sis-dis.svc.cluster.local:5000"]
        metrics_path: "/metrics"

      - job_name: "servico"
        static_configs:
          - targets: ["servico.trabalho-sis-dis.svc.cluster.local:5001"]
        metrics_path: "/metrics"

      - job_name: "redis-exporter"
        static_configs:
          - targets: ["redis-exporter.trabalho-sis-dis.svc.cluster.local:9121"]
        metrics_path: "/metrics"

      - job_name: "kubernetes-pods"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - trabalho-sis-dis
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2

      - job_name: "kubernetes-nodes-cadvisor"
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor
        metric_relabel_configs:
          - source_labels: [__name__]
            action: keep
            regex: "container_(cpu|memory|network|fs)_.*|kube_pod_container_status_restarts_total"
