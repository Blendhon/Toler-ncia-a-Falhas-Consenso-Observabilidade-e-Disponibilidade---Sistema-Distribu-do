apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  namespace: trabalho-sis-dis
  labels:
    app: redis-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-exporter
  template:
    metadata:
      labels:
        app: redis-exporter
    spec:
      containers:
        - name: redis-exporter
          image: oliver006/redis_exporter:v1.61.0
          args:
            - "--redis.addr=redis.trabalho-sis-dis.svc.cluster.local:6379"
          ports:
            - containerPort: 9121
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "50m"
---
apiVersion: v1
kind: Service
metadata:
  name: redis-exporter
  namespace: trabalho-sis-dis
  labels:
    app: redis-exporter
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9121"
spec:
  selector:
    app: redis-exporter
  ports:
    - port: 9121
      targetPort: 9121
