apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: trabalho-sis-dis
  labels:
    app: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: SERVICO_URL
              value: "http://servico:5001"
            - name: REQUEST_TIMEOUT
              value: "2"
            - name: MAX_RETRIES
              value: "3"
            - name: CIRCUIT_BREAKER_THRESHOLD
              value: "3"
            - name: CIRCUIT_BREAKER_RECOVERY
              value: "10"
          resources:
            requests:
              memory: "128Mi"
              cpu: "150m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: trabalho-sis-dis
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30000
