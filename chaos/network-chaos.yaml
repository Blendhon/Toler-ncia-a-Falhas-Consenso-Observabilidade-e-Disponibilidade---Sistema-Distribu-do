apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: network-delay-servico
  namespace: trabalho-sis-dis
spec:
  action: delay
  mode: all
  selector:
    namespaces:
      - trabalho-sis-dis
    labelSelectors:
      app: servico
  delay:
    latency: "3000ms"
    jitter: "500ms"
    correlation: "50"
  duration: "300s"
---
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: network-loss-gateway-servico
  namespace: trabalho-sis-dis
spec:
  action: loss
  mode: all
  selector:
    namespaces:
      - trabalho-sis-dis
    labelSelectors:
      app: gateway
  loss:
    loss: "30"
    correlation: "25"
  target:
    mode: all
    selector:
      namespaces:
        - trabalho-sis-dis
      labelSelectors:
        app: servico
  duration: "300s"
